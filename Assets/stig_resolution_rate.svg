<svg xmlns="http://www.w3.org/2000/svg" width="600" height="220" viewBox="0 0 600 220" role="img">
  <title>STIG finding resolution rate by severity</title>
  <desc>Horizontal bars: overall 93.1%, CAT I 58.3%, CAT II 96.5%, CAT III 73.7%</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #0d1117; }
      .label { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; font-size: 12px; fill: #57606a; }
      .label-dark { fill: #8b949e; }
      .title { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; font-size: 13px; font-weight: 600; fill: #24292f; }
      .val { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; font-size: 11px; fill: #ffffff; font-weight: 500; }
      .metric-big { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; font-size: 28px; font-weight: 700; }
      .metric-sm { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; font-size: 12px; fill: #57606a; }
      .sub { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; font-size: 11px; fill: #57606a; }
    </style>
  </defs>
  <rect x="0" y="0" width="600" height="220" fill="#f6f8fa" rx="8" stroke="#d0d7de" stroke-width="1"/>
  <text x="300" y="24" text-anchor="middle" class="title">Resolution Rate by Severity Category</text>
  <rect x="120" y="50" width="400" height="28" fill="#e1e4e8" rx="4"/>
  <rect x="120" y="50" width="372" height="28" fill="#0969da" rx="4"/>
  <text x="112" y="68" text-anchor="end" font-family="-apple-system,sans-serif" font-size="12" fill="#24292f">Overall</text>
  <text x="498" y="68" font-family="-apple-system,sans-serif" font-size="12" font-weight="600" fill="#0969da">93.1%</text>
  <rect x="120" y="94" width="400" height="28" fill="#e1e4e8" rx="4"/>
  <rect x="120" y="94" width="233" height="28" fill="#cf222e" rx="4"/>
  <text x="112" y="112" text-anchor="end" font-family="-apple-system,sans-serif" font-size="12" fill="#24292f">CAT I — High</text>
  <text x="359" y="112" font-family="-apple-system,sans-serif" font-size="12" font-weight="600" fill="#cf222e">58.3%</text>
  <rect x="120" y="138" width="400" height="28" fill="#e1e4e8" rx="4"/>
  <rect x="120" y="138" width="386" height="28" fill="#bf8700" rx="4"/>
  <text x="112" y="156" text-anchor="end" font-family="-apple-system,sans-serif" font-size="12" fill="#24292f">CAT II — Medium</text>
  <text x="512" y="156" font-family="-apple-system,sans-serif" font-size="12" font-weight="600" fill="#bf8700">96.5%</text>
  <rect x="120" y="182" width="400" height="28" fill="#e1e4e8" rx="4"/>
  <rect x="120" y="182" width="294" height="28" fill="#6e7781" rx="4"/>
  <text x="112" y="200" text-anchor="end" font-family="-apple-system,sans-serif" font-size="12" fill="#24292f">CAT III — Low</text>
  <text x="420" y="200" font-family="-apple-system,sans-serif" font-size="12" font-weight="600" fill="#6e7781">73.7%</text>

</svg>